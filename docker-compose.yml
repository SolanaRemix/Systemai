version: '3.9'
services:
  app:
    build: .
    ports:
      - '5173:5173'
    environment:
      - SYSTEMAI_ENV=development
    volumes:
      - .:/app
    depends_on:
      - ollama
      - postgres
      - redis
  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: systemai
      POSTGRES_PASSWORD: systemai
      POSTGRES_DB: systemai
    ports:
      - '5432:5432'
  redis:
    image: redis:7
    ports:
      - '6379:6379'
